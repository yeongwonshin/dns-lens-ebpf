apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dnsmon-rules
  namespace: dnsmon-system
spec:
  groups:
    - name: dnsmon.rules
      rules:
        - alert: DNSLatencyP95High
          expr: |
            histogram_quantile(0.95, sum by (le, namespace, pod, domain) (rate(dnsmon_latency_seconds_bucket[5m]))) > 0.2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "DNS p95 latency high for {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Domain {{ $labels.domain }} has p95 DNS latency over 200ms for 5 minutes."
        - alert: DNSNXDomainRateHigh
          expr: |
            sum by (namespace, pod, domain) (rate(dnsmon_nxdomain_total[5m]))
            /
            clamp_min(sum by (namespace, pod, domain) (rate(dnsmon_queries_total[5m])), 1)
            > 0.2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "DNS NXDOMAIN ratio high for {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "More than 20% of DNS responses for {{ $labels.domain }} are NXDOMAIN."
        - alert: DNSTimeoutsDetected
          expr: sum by (namespace, pod, domain) (increase(dnsmon_timeouts_total[5m])) > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "DNS timeouts detected for {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "At least one DNS query timeout was observed for {{ $labels.domain }}."
