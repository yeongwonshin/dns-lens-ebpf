apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dnsmon
  namespace: dnsmon-system
  labels:
    app.kubernetes.io/name: dnsmon
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dnsmon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dnsmon
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: dnsmon
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: dnsmon
          image: ghcr.io/example/dnsmon:latest
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-addr=$(METRICS_ADDR)
            - --iface-prefix=$(IFACE_PREFIX)
            - --latency-threshold=$(LATENCY_THRESHOLD)
            - --timeout-window=$(TIMEOUT_WINDOW)
            - --domain-allow-suffix=$(DOMAIN_ALLOW_SUFFIX)
            - --domain-deny-suffix=$(DOMAIN_DENY_SUFFIX)
            - --max-domain-labels=$(MAX_DOMAIN_LABELS)
          envFrom:
            - configMapRef:
                name: dnsmon-config
          ports:
            - containerPort: 9090
              hostPort: 9090
              name: metrics
          securityContext:
            privileged: true
            capabilities:
              add:
                - BPF
                - NET_ADMIN
                - PERFMON
                - SYS_RESOURCE
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: bpffs
              mountPath: /sys/fs/bpf
            - name: debugfs
              mountPath: /sys/kernel/debug
      volumes:
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
            type: DirectoryOrCreate
